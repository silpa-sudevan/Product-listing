<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail — SuperLabs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f6fa; color: #222; min-height: 100vh; }
    header { background: #1a1a2e; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; }
    header nav a { color: #aad4f5; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }
    header nav a:hover { color: #fff; }
    header nav a.nav-admin { background: #0f3460; color: #aad4f5; padding: 5px 14px; border-radius: 20px; font-weight: 600; font-size: 0.82rem; transition: background .2s; }
    header nav a.nav-admin:hover { background: #16457a; color: #fff; }
    header nav a.nav-highlight { background: #f5a623; color: #1a1a2e; padding: 5px 14px; border-radius: 20px; font-weight: 700; font-size: 0.82rem; transition: background .2s; }
    header nav a.nav-highlight:hover { background: #ffbe45; color: #1a1a2e; }
    .breadcrumb { max-width: 1100px; margin: 16px auto; padding: 0 24px; font-size: 0.85rem; color: #888; }
    .breadcrumb a { color: #e94560; text-decoration: none; }
    main { max-width: 1100px; margin: 0 auto 40px; padding: 0 24px; }
    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: #fff; border-radius: 14px; padding: 32px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
    @media (max-width: 700px) { .product-layout { grid-template-columns: 1fr; } }
    .gallery { display: flex; flex-direction: column; gap: 12px; }
    .main-img { width: 100%; border-radius: 10px; object-fit: cover; max-height: 360px; background: #eee; border: 1px solid #eee; }
    .thumbnails { display: flex; gap: 8px; flex-wrap: wrap; }
    .thumbnail { width: 68px; height: 68px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 2px solid transparent; }
    .thumbnail.active { border-color: #e94560; }
    .img-placeholder { width: 100%; height: 320px; background: linear-gradient(135deg,#667eea,#764ba2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 5rem; }
    .product-info { display: flex; flex-direction: column; gap: 14px; }
    .brand-tag { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    h2.product-name { font-size: 1.6rem; line-height: 1.3; }
    .sku { font-size: 0.8rem; color: #aaa; }
    .rating-row { display: flex; align-items: center; gap: 10px; }
    .stars { color: #f5a623; font-size: 1rem; }
    .rating-num { font-weight: 700; }
    .review-count { color: #888; font-size: 0.85rem; }
    .price-row { display: flex; align-items: baseline; gap: 12px; }
    .price { font-size: 2rem; font-weight: 700; color: #e94560; }
    .compare-price { font-size: 1.1rem; color: #aaa; text-decoration: line-through; }
    .discount-badge { background: #e6f9ef; color: #1a7a40; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
    .avail-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; }
    .in_stock { background: #e6f9ef; color: #1a7a40; }
    .out_of_stock { background: #fdecea; color: #c62828; }
    .pre_order { background: #fff3e0; color: #e65100; }
    .short-desc { color: #555; line-height: 1.6; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { background: #f0f0f0; color: #555; border-radius: 4px; padding: 3px 10px; font-size: 0.78rem; }
    .btn-primary { padding: 13px 36px; background: #e94560; border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; width: 100%; }
    .btn-primary:hover { background: #c73652; }
    .section { background: #fff; border-radius: 14px; padding: 28px 32px; box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-top: 24px; }
    .section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }
    .description { color: #444; line-height: 1.8; white-space: pre-wrap; }
    .specs-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .specs-table tr:nth-child(even) { background: #fafafa; }
    .specs-table td { padding: 8px 12px; border: 1px solid #eee; }
    .specs-table td:first-child { font-weight: 600; color: #555; width: 35%; }
    .reviews-list { display: flex; flex-direction: column; gap: 16px; }
    .review-card { border: 1px solid #eee; border-radius: 10px; padding: 16px; }
    .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .reviewer-name { font-weight: 600; }
    .review-date { font-size: 0.8rem; color: #aaa; }
    .review-comment { color: #555; line-height: 1.6; }
    .no-reviews { color: #aaa; text-align: center; padding: 24px; }
    .loading { text-align: center; padding: 80px 20px; }
    .spinner { width: 44px; height: 44px; border: 4px solid #eee; border-top-color: #e94560; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { max-width: 500px; margin: 80px auto; text-align: center; background: #fff; padding: 40px; border-radius: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
  </style>
</head>
<body>

<header>
  <h1>🛒 Product Listing</h1>
  <nav>
    <a href="/">← Back to Products</a>
    <a href="/admin.html" class="nav-admin">🔧 Admin</a>
    <a href="/api/docs" target="_blank" class="nav-highlight">📄 API Docs</a>
  </nav>
</header>

<div class="breadcrumb" id="breadcrumb"></div>

<main id="main">
  <div class="loading"><div class="spinner"></div><p>Loading product...</p></div>
</main>

<script>
  const slug = new URLSearchParams(location.search).get('slug') || new URLSearchParams(location.search).get('id');

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = String(str ?? '');
    return d.innerHTML;
  }

  function starsHtml(rating) {
    const full = Math.round(rating || 0);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  async function loadProduct() {
    if (!slug) {
      document.getElementById('main').innerHTML = `<div class="error-box"><h2>No product specified</h2><p><a href="/">Back to search</a></p></div>`;
      return;
    }

    try {
      const res = await fetch(`/api/products/${encodeURIComponent(slug)}`);
      if (!res.ok) throw new Error(`Product not found (${res.status})`);
      const p = await res.json();

      document.title = `${p.name} — SuperLabs`;

      // Breadcrumb
      document.getElementById('breadcrumb').innerHTML =
        `<a href="/">Home</a> / <a href="/?category=${encodeURIComponent(p.category)}">${escapeHtml(p.category)}</a> / ${escapeHtml(p.name)}`;

      // Discount %
      const discountPct = p.compareAtPrice && p.compareAtPrice > p.price
        ? Math.round((1 - p.price / p.compareAtPrice) * 100)
        : null;

      // Images
      const hasImages = p.images && p.images.length > 0;
      const galleryHtml = hasImages
        ? `<img class="main-img" id="mainImg" src="${escapeHtml(p.images[0])}" alt="${escapeHtml(p.name)}" />
           ${p.images.length > 1 ? `<div class="thumbnails">
             ${p.images.map((img, i) => `<img class="thumbnail ${i===0?'active':''}" src="${escapeHtml(img)}" data-i="${i}" alt="img ${i+1}" />`).join('')}
           </div>` : ''}`
        : `<div class="img-placeholder">🛍️</div>`;

      // Specs
      const specsObj = p.specifications && typeof p.specifications === 'object' ? p.specifications : {};
      const specKeys = Object.keys(specsObj);

      // Dimensions row
      const dims = p.dimensions;
      if (dims && (dims.length || dims.width || dims.height)) {
        specKeys; 
      }

      const availLabel = p.availability === 'in_stock' ? 'In Stock' :
                         p.availability === 'out_of_stock' ? 'Out of Stock' : 'Pre-Order';

      document.getElementById('main').innerHTML = `
        <div class="product-layout">
          <div class="gallery">${galleryHtml}</div>
          <div class="product-info">
            <div class="brand-tag">${escapeHtml(p.brand)}</div>
            <h2 class="product-name">${escapeHtml(p.name)}</h2>
            <div class="sku">SKU: ${escapeHtml(p.sku)}</div>
            <div class="rating-row">
              <span class="stars">${starsHtml(p.rating)}</span>
              <span class="rating-num">${(p.rating||0).toFixed(1)}</span>
              <span class="review-count">(${p.reviewCount || 0} reviews)</span>
            </div>
            <div class="price-row">
              <span class="price">₹${Number(p.price).toLocaleString('en-IN')}</span>
              ${p.compareAtPrice ? `<span class="compare-price">₹${Number(p.compareAtPrice).toLocaleString('en-IN')}</span>` : ''}
              ${discountPct ? `<span class="discount-badge">${discountPct}% OFF</span>` : ''}
            </div>
            <span class="avail-badge ${p.availability}">${availLabel}</span>
            ${p.shortDescription ? `<p class="short-desc">${escapeHtml(p.shortDescription)}</p>` : ''}
            ${p.weight ? `<p style="color:#888;font-size:0.85rem;">Weight: ${p.weight} kg</p>` : ''}
            ${dims && (dims.length || dims.width || dims.height)
              ? `<p style="color:#888;font-size:0.85rem;">Dimensions: ${[dims.length, dims.width, dims.height].filter(Boolean).join(' × ')} ${dims.unit||'mm'}</p>` : ''}
            ${p.stockQuantity !== undefined ? `<p style="color:#888;font-size:0.85rem;">Stock: ${p.stockQuantity} units</p>` : ''}
            ${p.tags && p.tags.length ? `<div class="tags">${p.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
            <button class="btn-primary">Add to Cart</button>
          </div>
        </div>

        ${p.description ? `
        <div class="section">
          <h3>Description</h3>
          <p class="description">${escapeHtml(p.description)}</p>
        </div>` : ''}

        ${specKeys.length ? `
        <div class="section">
          <h3>Specifications</h3>
          <table class="specs-table">
            ${specKeys.map(k=>`<tr><td>${escapeHtml(k)}</td><td>${escapeHtml(specsObj[k])}</td></tr>`).join('')}
          </table>
        </div>` : ''}

        <div class="section">
          <h3>Customer Reviews (${p.reviewCount || 0})</h3>
          ${p.reviews && p.reviews.length
            ? `<div class="reviews-list">
                ${p.reviews.slice().reverse().map(r => `
                  <div class="review-card">
                    <div class="review-header">
                      <span class="reviewer-name">${escapeHtml(r.reviewer)}</span>
                      <div style="display:flex;align-items:center;gap:8px;">
                        <span class="stars" style="font-size:0.9rem;">${starsHtml(r.rating)}</span>
                        <span class="review-date">${new Date(r.date).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'})}</span>
                      </div>
                    </div>
                    <p class="review-comment">${escapeHtml(r.comment)}</p>
                  </div>`).join('')}
              </div>`
            : `<p class="no-reviews">No reviews yet. Be the first!</p>`}
        </div>
      `;

      // Thumbnail click
      document.querySelectorAll('.thumbnail').forEach(img => {
        img.addEventListener('click', () => {
          document.getElementById('mainImg').src = img.src;
          document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
          img.classList.add('active');
        });
      });

    } catch (err) {
      document.getElementById('main').innerHTML = `
        <div class="error-box">
          <h2 style="margin-bottom:12px;">Product not found</h2>
          <p style="color:#888;margin-bottom:20px;">${escapeHtml(err.message)}</p>
          <a href="/" style="color:#e94560;">← Back to products</a>
        </div>`;
    }
  }

  loadProduct();
</script>
</body>
</html>
